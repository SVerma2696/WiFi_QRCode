<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <!-- 
      Mobile Viewport & PWA Architecture: 
      Ensures 1:1 scaling on mobile devices and enables the app to be saved 
      to an iOS/Android home screen natively, hiding the browser UI chrome.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#060a12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Generate a scan-to-connect WiFi QR code entirely in your browser.">

    <!-- Asset Attribution & Favicon -->
    <link rel="icon" type="image/png" href="https://img2.clipart-library.com/28/wifi-logo-clipart/wifi-logo-clipart-18.png">

    <title>WiFi QR Code Generator</title>

    <!-- 
      CSS Framework: Tailwind CSS (via CDN)
      Chosen for rapid, atomic styling that inherently supports responsive design 
      across all screen sizes without maintaining massive external stylesheets.
    -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!--
      Dependency Injection: qr-code-styling
      Chosen over legacy canvas libraries for its robust support of native SVG rendering, 
      cross-origin image embedding, and automated error-correction scaling.
    -->
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

    <!-- Typography: Preconnecting improves Time-to-Interactive (TTI) performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /*
         * DESIGN TOKENS & THEMING ARCHITECTURE:
         * Utilizing CSS root variables allows for instantaneous, zero-repaint toggling 
         * between light and dark modes via JavaScript class injection.
         */
        :root {
            --bg-void: #060a12;       
            --bg-panel: #0d1420;      
            --bg-input: #0a1018;      
            --border-circuit: #1c2b3a; 
            --accent-cyan: #22d3ee;   
            --accent-amber: #ffb020;  
            --text-primary: #e6edf3;
            --text-muted: #64748b;
        }

        /* Light Theme Variable Overrides */
        :root.light-theme {
            --bg-void: #f8fafc;
            --bg-panel: #ffffff;
            --bg-input: #f1f5f9;
            --border-circuit: #e2e8f0;
            --accent-cyan: #0284c7; /* Darkened to guarantee WCAG AA contrast compliance */
            --accent-amber: #d97706;
            --text-primary: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-void);
            background-image:
                linear-gradient(rgba(34, 211, 238, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
            transition: background-color 0.3s ease;
            /* Removes the clunky blue tap-highlight on legacy Android browsers for a native feel */
            -webkit-tap-highlight-color: transparent; 
        }

        /* Semantic utility for system/machine data readouts */
        .font-tech {
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.03em;
        }

        /* 
         * CROSS-BROWSER UI NORMALIZATION:
         * Microsoft Edge & Chromium aggressively inject native password reveal icons.
         * If not forcefully hidden, they overlay our custom accessible UI, creating a bug.
         */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear { display: none !important; }
        input[type="password"]::-webkit-contacts-auto-fill-button,
        input[type="password"]::-webkit-credentials-auto-fill-button {
            visibility: hidden !important;
            display: none !important;
            pointer-events: none !important;
            opacity: 0 !important;
        }

        /* Ensures fluid scaling of the QR code regardless of device resolution */
        #qrcode-container svg, #qrcode-container canvas {
            margin: 0 auto;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
        }

        /* 
         * VISUAL FEEDBACK ANIMATIONS:
         * Scan Frame & Circuit Trace provide ambient system status indicators.
         */
        .scan-frame { position: relative; padding: 20px; }
        .scan-frame .corner {
            position: absolute;
            width: 22px; height: 22px;
            border: 2px solid var(--accent-cyan);
            animation: pulse-glow 2.4s ease-in-out infinite;
        }
        .scan-frame .corner.top-left    { top: 0; left: 0; border-right: none; border-bottom: none; }
        .scan-frame .corner.top-right   { top: 0; right: 0; border-left: none; border-bottom: none; }
        .scan-frame .corner.bottom-left { bottom: 0; left: 0; border-right: none; border-top: none; }
        .scan-frame .corner.bottom-right{ bottom: 0; right: 0; border-left: none; border-top: none; }

        @keyframes pulse-glow { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
        
        .circuit-trace { position: relative; overflow: hidden; }
        .circuit-trace::before {
            content: ""; position: absolute; top: 0; left: -40%; width: 40%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            animation: trace-sweep 4s linear infinite;
        }
        @keyframes trace-sweep { from { left: -40%; } to { left: 100%; } }

        /* 
         * ACCESSIBILITY (a11y): 
         * Strictly honors OS-level "Reduce Motion" preferences for users with vestibular disorders.
         */
        @media (prefers-reduced-motion: reduce) {
            .scan-frame .corner { animation: none; opacity: 1; }
            .circuit-trace::before { display: none; }
        }

        /* 
         * PHYSICAL PRINT ARCHITECTURE (@media print):
         * Hijacks the browser print dialog to transform a digital web app into a 
         * physical document generator without needing backend PDF rendering.
         */
        @media print {
            @page { margin: 0; }
            body, main {
                background: white !important;
                background-image: none !important;
                margin: 0 !important; padding: 0 !important; display: block !important;
            }
            
            /* Break Tailwind layout constraints for paper */
            .max-w-4xl { max-width: 100% !important; width: 100% !important; }
            .overflow-hidden { overflow: visible !important; }
            .shadow-xl, .border { box-shadow: none !important; border: none !important; }
            .rounded-2xl { border-radius: 0 !important; }

            /* Strip form and UI elements to save user printer ink */
            #left-col, .print-hide, .scan-frame .corner, .circuit-trace::before { display: none !important; }

            /* Default Single Card Print Layout */
            #right-col {
                position: absolute !important; left: 0 !important; top: 0 !important;
                width: 100vw !important; min-height: 100vh !important;
                background-color: white !important; border: none !important;
                display: flex !important; flex-direction: column !important;
                justify-content: center !important; align-items: center !important;
            }
            
            #qrcode-container { margin-bottom: 30px !important; box-shadow: none !important; }
            #qrcode-container svg, #qrcode-container canvas { box-shadow: none !important; }
            
            /* Text nodes dynamically revealed exclusively for physical media */
            #network-display { display: block !important; color: black !important; font-size: 28px !important; font-weight: 700 !important; margin-bottom: 12px !important; font-family: monospace; }
            #password-display { display: block !important; color: #333333 !important; font-size: 20px !important; font-weight: 500 !important; font-family: monospace; margin-bottom: 12px !important; }
            #print-instructions { display: block !important; color: #333333 !important; font-size: 18px !important; font-weight: 500 !important; }

            /* 
             * Multi-Card Batch Print Grid Layout 
             * Dynamically engaged via JavaScript class injection.
             */
            body.batch-printing #right-col { display: none !important; }
            body.batch-printing #batch-print-container {
                display: flex !important; flex-wrap: wrap !important; gap: 40px !important;
                justify-content: center !important; padding: 40px !important;
                width: 100vw !important; min-height: 100vh !important;
                position: absolute !important; top: 0 !important; left: 0 !important;
                background: white !important;
            }
            .batch-card {
                display: flex !important; flex-direction: column !important; align-items: center !important; text-align: center !important;
                page-break-inside: avoid !important; border: 2px dashed #cbd5e1 !important; padding: 30px !important; border-radius: 16px !important;
                width: calc(50% - 20px) !important; /* Establishes a clean 2-column grid */
            }
        }
    </style>
</head>

                <p class="font-tech text-xs text-[color:var(--accent-cyan)] mb-3 tracking-widest">CONFIG // 01</p>

                <div class="mb-6 flex items-center gap-4">

                    <div>

                    </div>
                </div>

                <!-- 
                  Input Form:

                -->
                <form id="wifi-form" class="space-y-5 flex-grow" novalidate onsubmit="event.preventDefault();">
                    
                    <!-- 
                      UX Optimization: `autocorrect="off"`, `autocapitalize="none"`, and `spellcheck="false"` 
                      are critical here. Mobile keyboards aggressively try to fix SSIDs, causing immense user friction. 
                    -->
                    <div>
                        <label for="ssid" class="font-tech block text-xs font-semibold text-[color:var(--text-muted)] mb-1 uppercase tracking-wide">Network Name (SSID) *</label>

                            autocorrect="off" autocapitalize="none" spellcheck="false"
                            class="w-full px-4 py-3 rounded-lg border border-[color:var(--border-circuit)] bg-[color:var(--bg-input)] text-[color:var(--text-primary)] placeholder-[color:var(--text-muted)] focus:ring-2 focus:ring-[color:var(--accent-cyan)] focus:border-[color:var(--accent-cyan)] outline-none transition-all">
                    </div>

                    <div>
                        <label for="password" class="font-tech block text-xs font-semibold text-[color:var(--text-muted)] mb-1 uppercase tracking-wide">Password</label>
                        <div class="relative">
                            <input type="password" id="password" placeholder="Leave blank if no password" 
                                autocomplete="new-password" autocorrect="off" autocapitalize="none" spellcheck="false"
                                class="w-full px-4 py-3 rounded-lg border border-[color:var(--border-circuit)] bg-[color:var(--bg-input)] text-[color:var(--text-primary)] placeholder-[color:var(--text-muted)] focus:ring-2 focus:ring-[color:var(--accent-cyan)] focus:border-[color:var(--accent-cyan)] outline-none transition-all pr-12">
                            
                            <!-- Custom visibility toggle button properly mapped with aria attributes for AT (Screen Readers) -->
                            <button type="button" onclick="togglePasswordVisibility()" aria-label="Show password" aria-pressed="false" id="toggle-pwd-btn" 
                                class="absolute inset-y-[2px] right-[2px] px-3 bg-[color:var(--bg-input)] rounded-r-md text-[color:var(--text-muted)] hover:text-[color:var(--accent-cyan)] focus:outline-none transition-colors flex items-center justify-center">
                                <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5" aria-hidden="true">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div>
                        <label for="encryption" class="font-tech block text-xs font-semibold text-[color:var(--text-muted)] mb-1 uppercase tracking-wide">Security Type</label>
                        <select id="encryption" class="w-full px-4 py-3 rounded-lg border border-[color:var(--border-circuit)] bg-[color:var(--bg-input)] text-[color:var(--text-primary)] focus:ring-2 focus:ring-[color:var(--accent-cyan)] focus:border-[color:var(--accent-cyan)] outline-none transition-all">
                            <option value="WPA">WPA/WPA2/WPA3 (Most Common)</option>
                            <option value="WEP">WEP (Older Standard)</option>

                    </div>

                    <!-- Edge-Case Toggles -->
                    <div class="space-y-2 mt-2">
                        <div class="flex items-center">

                            <label for="hidden" class="ml-3 text-sm text-[color:var(--text-primary)] font-medium">This is a hidden network</label>
                        </div>
                        <div class="flex items-center">
                            <input type="checkbox" id="show-password-on-print" class="w-5 h-5 rounded border-[color:var(--border-circuit)] bg-[color:var(--bg-input)]" style="accent-color: var(--accent-cyan);">

                    </div>

                    <!-- Dynamic Error State Display: Hidden by default, updated via JS validation -->
                    <div id="error-msg" class="font-tech hidden text-red-500 text-sm font-medium p-3 bg-red-950/20 rounded-lg border border-red-900/50" role="alert"></div>
                </form>

                <!-- Footer / Source Repository -->

                            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                        </svg>
                        <span>VIEW_SOURCE</span>
                    </a>
                </div>
            </div>

            <!-- Right Column: Visual Output & Actions -->
            <div id="right-col" class="w-full md:w-1/2 p-8 lg:p-10 bg-[color:var(--bg-void)] flex flex-col items-center justify-center text-center relative border-t md:border-t-0 md:border-l border-[color:var(--border-circuit)] transition-colors">

                <p class="font-tech text-xs text-[color:var(--accent-cyan)] mb-3 tracking-widest print-hide">OUTPUT // 02</p>
                <h2 class="text-xl font-semibold text-[color:var(--text-primary)] mb-6 print-hide transition-colors">Live Preview</h2>

                <div class="scan-frame">
                    <span class="corner top-left print-hide"></span>
                    <span class="corner top-right print-hide"></span>
                    <span class="corner bottom-left print-hide"></span>
                    <span class="corner bottom-right print-hide"></span>
                    <!-- 
                      ARIA Live Region: Polite injection announces QR updates to screen readers

                    <div id="qrcode-container" aria-live="polite" class="bg-white p-4 rounded-xl shadow-2xl min-h-[288px] min-w-[288px] flex items-center justify-center transition-all">

                </div>

                <p id="network-display" class="mt-6 text-[color:var(--accent-cyan)] font-mono text-sm hidden"></p>
                <p id="password-display" class="text-slate-500 font-mono text-sm hidden"></p>
                <p id="print-instructions" class="hidden mt-2 text-slate-400 text-sm">Point your phone's camera here to connect directly!</p>

                    <button type="button" id="btn-svg" onclick="downloadCode('svg', this)" class="font-tech bg-[color:var(--bg-input)] hover:border-[color:var(--accent-cyan)] hover:text-[color:var(--accent-cyan)] text-[color:var(--text-primary)] border border-[color:var(--border-circuit)] font-medium py-2 px-4 rounded-lg transition-all flex items-center justify-center gap-2">

                    <button type="button" id="btn-png" onclick="downloadCode('png', this)" class="font-tech bg-[color:var(--bg-input)] hover:border-[color:var(--accent-cyan)] hover:text-[color:var(--accent-cyan)] text-[color:var(--text-primary)] border border-[color:var(--border-circuit)] font-medium py-2 px-4 rounded-lg transition-all flex items-center justify-center gap-2">
                        <span>Get PNG</span>
                    </button>
                    <button type="button" id="btn-copy" onclick="copyWifiString()" class="col-span-2 font-tech bg-[color:var(--accent-cyan)] hover:brightness-110 text-[#031017] font-semibold py-2 px-4 rounded-lg transition-all flex items-center justify-center gap-2">
                        <span>Copy Connection String</span>
                    </button>
                </div>

                <!-- Batch Queue Actions -->
                <div id="batch-actions" class="hidden w-full max-w-sm mt-3 flex flex-col gap-3 print-hide">
                    <button type="button" id="btn-add-queue" onclick="addToBatchQueue()" class="font-tech bg-[color:var(--bg-input)] hover:border-[color:var(--accent-amber)] hover:text-[color:var(--accent-amber)] text-[color:var(--text-primary)] border border-[color:var(--border-circuit)] font-medium py-2 px-4 rounded-lg transition-all flex items-center justify-center gap-2">
                        <span>+ Add To Print Queue</span>
                    </button>
                    
                    <div id="queue-status-container" class="hidden items-center justify-between bg-[color:var(--bg-panel)] p-3 rounded-lg border border-[color:var(--border-circuit)]">
                        <div class="flex flex-col text-left">
                            <span class="font-tech text-xs text-[color:var(--text-muted)]">QUEUE: <strong id="queue-count" class="text-[color:var(--accent-amber)] text-base">0</strong></span>
                            
                            <div class="flex gap-2 mt-1">
                                <button type="button" onclick="removeLastFromQueue()" class="font-tech text-[10px] text-[color:var(--text-muted)] hover:text-white transition-colors uppercase">
                                    [-1 Last]
                                </button>
                                <button type="button" onclick="clearBatchQueue()" class="font-tech text-[10px] text-red-500 hover:text-red-400 transition-colors uppercase">
                                    [Clear All]
                                </button>
                            </div>
                        </div>
                        <button type="button" id="btn-print" onclick="handleBatchPrint()" class="font-tech bg-[color:var(--accent-amber)] hover:brightness-110 text-[#1a1200] font-semibold py-1.5 px-3 rounded flex items-center gap-2 text-sm transition-all">
                            <span>Print All</span>
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Hidden Rendering Target for Virtual DOM Construction (Batch Print Mode) -->
    <div id="batch-print-container" class="hidden"></div>

    <script>
        // =========================================
        // GLOBAL STATE MANAGEMENT
        // =========================================
        let qrCodeStylingInstance = null; 
        let currentWifiString = "";       
        let printQueue = [];              

        /* =========================================
           CORE LOGIC & PERFORMANCE UTILITIES
           ========================================= */

        /**
         * Performance Architecture: Debounce Execution
         * Restricts the frequency of heavy Canvas/SVG calculations. By delaying execution until 
         * the user naturally pauses typing, we completely eliminate input lag and UI jank.
         */
        const debounce = (func, wait) => {
            let timeout;
            const debounced = function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
            // Expose a flush method for state synchronization right before synchronous events (like printing)
            debounced.flush = () => clearTimeout(timeout);
            return debounced;
        };

        /**
         * UX Utility: Non-blocking Button Feedback
         * Temporarily mutates button state to confirm user action (e.g., "Copied!"), 
         * then gracefully resets, avoiding the need for heavy toast-notification libraries.
         */
        function provideButtonFeedback(buttonId, successText) {
            const btn = document.getElementById(buttonId);
            if (!btn) return;
            const textSpan = btn.querySelector('span'); 
            if (!textSpan) return;
            
            const originalText = textSpan.dataset.originalText || textSpan.textContent;
            textSpan.dataset.originalText = originalText;
            textSpan.textContent = successText;
            
            if (btn.feedbackTimeout) clearTimeout(btn.feedbackTimeout);
            btn.feedbackTimeout = setTimeout(() => { textSpan.textContent = originalText; }, 2000);
        }

        /**
         * Data Sanitization & Protocol Compliance:
         * The global MECARD spec dictates that reserved structural characters must be escaped.
         * Failing to run this regex causes mobile OS parsers to instantly fail on complex passwords.
         */
        const escapeMecardString = (str) => str.replace(/([\\;:,])/g, "\\$1");

        /**
         * Hard Validation: Identifies fatal flaws that explicitly break the Wi-Fi protocol.
         */
        function getHardError(ssid) {
            if (!ssid) return "Network Name (SSID) is required.";
            if (ssid.length > 32) return "Network name is too long (32 characters max).";
            return null;
        }

        /**
         * Soft Validation: Identifies logical flaws where the QR code will successfully 
         * generate visually, but will be rejected by the device's network manager.
         */
        function getSoftWarning(password, encryption) {
            if (encryption === 'WPA' && password) {
                if (password.length < 8) return "WPA passwords must be at least 8 characters.";
                if (password.length > 63) return "WPA passwords must be 63 characters or fewer.";
            }
            if (encryption === 'WEP' && password && ![5, 10, 13, 26].includes(password.length)) {
                return "WEP keys are usually 5 or 13 characters (or 10/26 hex digits).";
            }
            return null;
        }

        /**
         * CORS Architecture Fix: Inline SVG Payload
         * External image calls trigger "Tainted Canvas" security blocks in modern browsers. 
         * Hardcoding the asset as a Base64-style Data URI securely circumvents this restriction.
         */
        const WIFI_LOGO_SVG = "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230f172a'%3E%3Cpath d='M12 3C7.3 3 3 4.8 0 7.8l2.1 2.6C4.5 7.9 8.1 6.5 12 6.5s7.5 1.4 9.9 3.9l2.1-2.6C21 4.8 16.7 3 12 3zm0 4.5c-3.4 0-6.6 1.2-9.1 3.2l2.1 2.6c1.9-1.5 4.3-2.3 7-2.3s5.1.8 7 2.3l2.1-2.6c-2.5-2-5.7-3.2-9.1-3.2zm0 4.5c-2 0-3.9.7-5.4 1.8l2.1 2.6c.9-.7 2-1.1 3.3-1.1s2.4.4 3.3 1.1l2.1-2.6c-1.5-1.1-3.4-1.8-5.4-1.8zm0 4.5c-.8 0-1.5.3-2.1.8l2.1 2.6 2.1-2.6c-.6-.5-1.3-.8-2.1-.8z'/%3E%3C/svg%3E";

        /**
         * Primary Execution Engine
         * Orchestrates state extraction, data sanitization, UI updates, and Canvas rendering.
         */
        function generateQRCode(showWarning = false) {
            const ssid = document.getElementById('ssid').value.trim();
            const password = document.getElementById('password').value;
            const encryption = document.getElementById('encryption').value;
            const isHidden = document.getElementById('hidden').checked;
            const showPasswordOnPrint = document.getElementById('show-password-on-print').checked;
            
            const errorMsg = document.getElementById('error-msg');
            const actionButtons = document.getElementById('action-buttons');
            const batchActions = document.getElementById('batch-actions');
            const container = document.getElementById('qrcode-container');

            // Browser Storage Integration: Caches non-sensitive configuration states for returning users
            localStorage.setItem('wifi_qr_prefs', JSON.stringify({ ssid, encryption, hidden: isHidden }));

            if (!ssid && !password) {
                container.innerHTML = '<p class="font-tech text-slate-400 text-sm px-8" id="placeholder-text">&gt; awaiting network details...</p>';
                actionButtons.classList.add('hidden'); 
                batchActions.classList.add('hidden');
                errorMsg.classList.add('hidden');
                currentWifiString = "";
                qrCodeStylingInstance = null;
                return;
            }

            const hardError = getHardError(ssid);
            if (hardError) {
                errorMsg.textContent = hardError;
                errorMsg.classList.remove('hidden');
                actionButtons.classList.add('hidden'); 
                batchActions.classList.add('hidden');
                currentWifiString = "";
                return;
            }

            const softWarning = getSoftWarning(password, encryption);
            if (softWarning && showWarning) {
                errorMsg.textContent = softWarning;
                errorMsg.classList.remove('hidden');
            } else {
                errorMsg.classList.add('hidden');
            }

            const escapedSSID = escapeMecardString(ssid);
            const escapedPassword = escapeMecardString(password);

            let wifiString = `WIFI:S:${escapedSSID};T:${encryption};`;
            if (encryption !== 'nopass' && password) { wifiString += `P:${escapedPassword};`; }
            wifiString += `H:${isHidden ? 'true' : 'false'};;`;
            currentWifiString = wifiString;

            // Engine Configuration
            const qrOptions = {
                width: 256,
                height: 256,
                type: "canvas", 
                data: wifiString,
                margin: 4,
                image: WIFI_LOGO_SVG,
                
                // UX Optimization: Quartile ('Q') Error Correction ensures the embedded logo 
                // is legible without creating a pixel grid so dense that older mobile hardware 
                // struggles to establish autofocus lock.
                qrOptions: { errorCorrectionLevel: 'Q' }, 
                
                imageOptions: { margin: 4, imageSize: 0.25 },
                dotsOptions: { color: "#0f172a", type: "square" },
                backgroundOptions: { color: "#ffffff" }
            };

            // Canvas Painting Lifecycle
            if (!qrCodeStylingInstance) {
                container.innerHTML = ''; 
                qrCodeStylingInstance = new QRCodeStyling(qrOptions);
                qrCodeStylingInstance.append(container);
            } else {
                qrCodeStylingInstance.update(qrOptions); 
            }

            // Print Context Hydration: Pre-loads DOM text elements that remain structurally 
            // hidden until the CSS `@media print` query actively fires.
            document.getElementById('network-display').textContent = `Network: ${ssid}`;
            document.getElementById('password-display').textContent = (showPasswordOnPrint && password) ? `Password: ${password}` : '';

            // State Guard: Prevents users from exporting functionally broken QR codes
            if (softWarning) {
                actionButtons.classList.add('hidden');
                batchActions.classList.add('hidden');
            } else {
                actionButtons.classList.remove('hidden');
                batchActions.classList.remove('hidden');
            }
        }

        /* =========================================
           APPLICATION BOOT & MOUNTING
           ========================================= */
        function initApp() {
            if (localStorage.getItem('theme') === 'light') toggleTheme(true);

            // Payload Parsing: Prioritizes explicit URL parameters, falling back to LocalStorage cache
            const params = new URLSearchParams(window.location.search);
            const saved = JSON.parse(localStorage.getItem('wifi_qr_prefs') || '{}');

            const ssid = params.get('ssid') || saved.ssid || '';
            const enc = params.get('type') || saved.encryption || 'WPA';
            const hidden = params.has('hidden') ? params.get('hidden') === 'true' : !!saved.hidden;
            // Strict Security Policy: Passwords are NEVER cached locally.
            const pass = params.get('password') || ''; 

            document.getElementById('ssid').value = ssid;
            document.getElementById('encryption').value = enc;
            document.getElementById('hidden').checked = hidden;
            if (pass) document.getElementById('password').value = pass;

            if (ssid) generateQRCode(false);
        }

        function toggleTheme(forceLight = false) {
            const isLight = forceLight || !document.documentElement.classList.contains('light-theme');
            const icon = document.getElementById('theme-icon');
            
            if (isLight) {
                document.documentElement.classList.add('light-theme');
                localStorage.setItem('theme', 'light');
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />';
            } else {
                document.documentElement.classList.remove('light-theme');
                localStorage.setItem('theme', 'dark');
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />';
            }
        }

        /* =========================================
           BATCH PRINTING QUEUE ARCHITECTURE
           ========================================= */
        function addToBatchQueue() {
            if (!syncBeforeAction()) return;
            const ssid = document.getElementById('ssid').value.trim();
            const password = document.getElementById('password').value;
            const showPass = document.getElementById('show-password-on-print').checked;
            
            // Queue Deduplication Logic
            if (!printQueue.some(item => item.ssid === ssid && item.password === password)) {
                printQueue.push({ ssid, password, showPass, wifiString: currentWifiString });
                updateQueueUI();
                provideButtonFeedback('btn-add-queue', 'Added to Queue!');
            } else {
                provideButtonFeedback('btn-add-queue', 'Already in Queue');
            }
        }
        
        function removeLastFromQueue() {
            if (printQueue.length > 0) {
                printQueue.pop();
                updateQueueUI();
            }
        }
        
        function clearBatchQueue() {
            printQueue = [];
            updateQueueUI();
        }

        function updateQueueUI() {
            const container = document.getElementById('queue-status-container');
            const count = document.getElementById('queue-count');
            if (printQueue.length > 0) {
                container.classList.remove('hidden');
                container.classList.add('flex');
                count.textContent = printQueue.length;
            } else {
                container.classList.add('hidden');
                container.classList.remove('flex');
            }
        }

        /**
         * DOM Hijacking for Batch Printing
         * Dynamically constructs a hidden Virtual DOM array of queued QR code configurations.
         * Upon execution, it forces the CSS to reveal this grid, yields the main thread to allow 
         * the Canvases to paint, and immediately fires the browser's native print dialogue.
         */
        function handleBatchPrint() {
            document.body.classList.add('batch-printing');
            const container = document.getElementById('batch-print-container');
            container.innerHTML = ''; 

            printQueue.forEach(item => {
                const card = document.createElement('div');
                card.className = 'batch-card';
                
                const qrDiv = document.createElement('div');
                card.appendChild(qrDiv);
                
                const title = document.createElement('p');
                title.style.cssText = "color: black; font-size: 20px; font-weight: bold; margin-top: 15px; font-family: monospace;";
                title.textContent = `Network: ${item.ssid}`;
                card.appendChild(title);

                if (item.showPass && item.password) {
                    const pass = document.createElement('p');
                    pass.style.cssText = "color: #333; font-size: 16px; font-family: monospace; margin-top: 5px;";
                    pass.textContent = `Password: ${item.password}`;
                    card.appendChild(pass);
                }

                container.appendChild(card);

                new QRCodeStyling({
                    width: 200, height: 200, type: "canvas", data: item.wifiString, margin: 0,
                    image: WIFI_LOGO_SVG,
                    qrOptions: { errorCorrectionLevel: 'Q' },
                    imageOptions: { margin: 4, imageSize: 0.25 },
                    dotsOptions: { color: "#0f172a", type: "square" },
                }).append(qrDiv);
            });

            setTimeout(() => {
                window.print();
                document.body.classList.remove('batch-printing');
                provideButtonFeedback('btn-print', 'Printing...');
            }, 300);
        }

        /* =========================================
           EVENT LISTENERS & HARDWARE APIS
           ========================================= */
        const debouncedGenerate = debounce(() => generateQRCode(false), 400);

        ['ssid', 'encryption'].forEach(id => {
            document.getElementById(id).addEventListener('input', debouncedGenerate);
        });
        const passwordField = document.getElementById('password');
        passwordField.addEventListener('input', debouncedGenerate);
        passwordField.addEventListener('blur', () => {
            debouncedGenerate.flush();
            generateQRCode(true);
        });

        document.getElementById('hidden').addEventListener('change', () => generateQRCode(true));
        document.getElementById('show-password-on-print').addEventListener('change', () => generateQRCode(true));

        /**
         * State Synchronization Middleware
         * Prevents asynchronous race conditions where a user finishes typing and immediately 
         * clicks "Download" before the 400ms debounce resolution cycle completes.
         */
        function syncBeforeAction() {
            debouncedGenerate.flush(); 
            generateQRCode(true); 
            return !document.getElementById('action-buttons').classList.contains('hidden');
        }

        window.addEventListener('beforeprint', () => {
            if (!document.body.classList.contains('batch-printing')) {
                generateQRCode(true);
            }
        });

        /**
         * Browser API: Secure Clipboard Execution
         * Implements the modern `navigator.clipboard` standard with legacy `document.execCommand` 
         * fallbacks to ensure broad functionality across all browser engines.
         */
        async function copyWifiString() {
            if (!syncBeforeAction() || !currentWifiString) return;

            try {
                await navigator.clipboard.writeText(currentWifiString);
                provideButtonFeedback('btn-copy', 'Copied!');
            } catch (err) {
                try {
                    const textArea = document.createElement("textarea");
                    textArea.value = currentWifiString;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand("copy");
                    document.body.removeChild(textArea);
                    provideButtonFeedback('btn-copy', 'Copied!');
                } catch (fallbackErr) {
                    console.error('Clipboard API Failed: ', fallbackErr);
                }
            }
        }

        function downloadCode(fileType, btnElement) {
            if (!syncBeforeAction() || !qrCodeStylingInstance) return;
            const ssidName = document.getElementById('ssid').value.trim() || 'network';
            
            qrCodeStylingInstance.download({ 
                name: `WiFi_QR_${ssidName.replace(/[^a-z0-9]/gi, '_').toLowerCase()}`, 
                extension: fileType 
            });
            
            provideButtonFeedback(btnElement.id, 'Downloaded!');
        }

        function togglePasswordVisibility() {
            const pwdInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            const toggleBtn = document.getElementById('toggle-pwd-btn');

            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                toggleBtn.setAttribute('aria-label', 'Hide password');
                toggleBtn.setAttribute('aria-pressed', 'true');
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />`;
            } else {
                pwdInput.type = 'password';
                toggleBtn.setAttribute('aria-label', 'Show password');
                toggleBtn.setAttribute('aria-pressed', 'false');
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />`;
            }
        }

        // Engage
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
